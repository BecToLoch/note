<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Заметки</title>
  <link rel="stylesheet" href="global.css">
</head>
<body class="dark">
  <main class="app-shell">
<section id="listScreen" class="screen" style="display:block;">
      <header class="topbar">
        <div class="title-block">
          <h1>Заметки</h1>
        </div>     
      </header>

  <div class="search-wrap">
    <span>🔎</span>
    <input id="searchInput" type="search" placeholder="Поиск">
  </div>
<div class="action-container">
  <select id="sortSelect" class="sort-select">
    <option value="dateDesc">Новое → Старое</option>
    <option value="dateAsc">Старое → Новое</option>
    <option value="titleAsc">Заголовок А→Я</option>
    <option value="titleDesc">Заголовок Я→А</option>
  </select>
  <button id="selectAllBtn" class="action-btn">Выбрать все</button>
</div>
<!-- deleteSelectedBtn removed as per request -->

  <section class="notes-section">
        <div class="section-title">
          <h2>Закреплённые</h2>
          <span id="pinnedCount">0</span>
        </div>
        <ul id="pinnedList" class="notes-list"></ul>
      </section>

      <section class="notes-section">
        <div class="section-title">
          <h2>Все заметки</h2>
          <span id="allCount">0</span>
        </div>
        <ul id="notesList" class="notes-list"></ul>
      </section>

      <button class="fab" id="addNoteBtn" type="button" aria-label="Создать заметку">+</button>
    </section>

<section id="editorScreen" class="screen editor-screen" style="display:none;">
      <header class="editor-toolbar">
        <button class="toolbar-button" id="backBtn" type="button">‹</button>
        <div class="toolbar-actions">
          <button class="toolbar-button" id="pinBtn" type="button" title="Закрепить">📌</button>
          <button class="toolbar-button" id="deleteBtn" type="button" title="Удалить">🗑</button>
          <button class="toolbar-button done" id="doneBtn" type="button">✓</button>
        </div>
      </header>

      <div class="editor-card">
        <input id="noteTitleInput" class="title-input" type="text" placeholder="Заголовок">
        <textarea id="noteBodyInput" class="body-input" placeholder="Заметка"></textarea>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
